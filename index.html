<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Boutique Premium</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f9;
        color: #333;
        text-align: center;
        padding: 50px;
      }
      .produit {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        display: inline-block;
        margin-top: 20px;
      }
      button {
        background-color: #0070f3;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background-color: #005bb5;
      }
    </style>
  </head>
  <body>
    <h1>Bienvenue sur Ma Boutique Premium 🛍️</h1>
    <p>Découvrez nos produits exceptionnels.</p>
    
    <div class="produit">
      <h2>Article Test Python</h2>
      <p>Prix : 29,99 €</p>
      <button>Ajouter au panier</button>
    </div>
  </body>
</html>
